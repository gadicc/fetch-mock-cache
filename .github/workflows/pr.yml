name: Pull Request
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
